<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;overflow:hidden;">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link href="js/vs/editor/editor.main.css" rel="stylesheet" />
</head>
<body style="width:100%;height:100%;">
    <div id="container" style="width:100%;height:100%;">
        <h1>Vista Python!</h1>
    </div>
     <script>var require = { paths: { 'vs': 'js/vs' } };</script>
    <script type="text/javascript" src="js/vs/loader.js"></script>
    <script type="text/javascript" src="js/vs/editor/editor.main.js"></script>
    <script>
        "use strict";
        var el = document.getElementById('container');
        el.style.height = '100%';
        el.style.width = '100%';

        var editor = null;
        var init = function () {

            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(document.getElementById("container"), {
                    value: "print 'hello world!'\n",
                    language: "python",
                    automaticLayout: true,
                    minimap: {
                        enabled: false
                    }
                });
            });
            window.removeEventListener("load", init);
        };
        window.addEventListener("load", init);
    </script>
</body>
</html>
